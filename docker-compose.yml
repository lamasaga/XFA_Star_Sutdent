version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/xinfuxue?schema=public
      - NEXTAUTH_SECRET=your-secret-key-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      # Prisma 连接池配置（适配轻量级服务器）
      - PRISMA_CONNECTION_LIMIT=10
      - PRISMA_POOL_TIMEOUT=10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=xinfuxue
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      # PostgreSQL 性能优化（适配轻量级服务器）
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=zh_CN.UTF-8
    ports:
      - "5432:5432"
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    # PostgreSQL 性能参数
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
      -c log_min_duration_statement=1000
      -c log_statement=none
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xinfuxue"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60

volumes:
  postgres_data:
  redis_data:
